spring.application.name=server

# ============================================================
# Local override: application-local.properties 가 있으면 자동 로드 (없으면 무시).
#   profile 활성화 없이도 동작. prod 환경에서는 그 파일 없으므로 fail-fast 의도 유지.
# ============================================================
spring.config.import=optional:classpath:application-local.properties

# ============================================================
# Database (env vars override the defaults — defaults are local-dev only)
# 20260602: ${VAR:default} 패턴으로 머신 별 설정 분리.
#   실서비스나 다른 개발자는 환경변수 또는 application-local.properties 로 덮어쓰기.
# ============================================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/quant_db?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
# 디폴트는 의도적으로 "CHANGE_ME" — fail-fast. 실제 비번은 환경변수 DB_PASSWORD 또는 application-local.properties 에서.
spring.datasource.password=${DB_PASSWORD:CHANGE_ME}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ============================================================
# Python 에이전트 경로 — 실행 디렉토리(project root) 기준 상대경로 기본.
#   Windows venv 디폴트: agent/venv/Scripts/python.exe
#   Linux/Mac venv 사용 시 PYTHON_PATH=agent/venv/bin/python 으로 오버라이드.
# ============================================================
collector.python-path=${PYTHON_PATH:agent/venv/Scripts/python.exe}
collector.script-path=${COLLECTOR_SCRIPT:agent/stock_collector.py}
backtest.script-path=${BACKTEST_SCRIPT:agent/backtest_runner.py}
collector.enabled=${COLLECTOR_ENABLED:false}

# 20260603: DevTools 자동 재시작 비활성화.
#   - 이전 인스턴스가 깨끗하게 안 죽고 8080 점유 좀비로 남는 문제 차단.
#   - 코드 변경 → 수동으로 정지/실행 해야 함 (mvn 의 kill-port-8080 훅이 자동으로 좀비 청소).
#   - LiveReload (정적 리소스 자동 새로고침)는 그대로 작동.
spring.devtools.restart.enabled=false

# AItr_manager(자연어 종목 추천) — 별도 venv + gguf LLM. V6/V5 LSTM 경로와 분리.
manager.python-path=${MANAGER_PYTHON:agent/AItr_manager/venv/Scripts/python.exe}
manager.script-path=${MANAGER_SCRIPT:agent/AItr_manager/main.py}
manager.timeout-seconds=${MANAGER_TIMEOUT:720}

# AItr_simulator (과거 프랙탈 패턴 매칭) — agent/venv 공유 (fastdtw 추가됨)
simulator.script-path=${SIMULATOR_SCRIPT:agent/pattern_match_service.py}
simulator.timeout-seconds=${SIMULATOR_TIMEOUT:60}

# ============================================================
# 로깅 — Python 측 진행로그(매 epoch, PhaseTimer 표 등)도 한 줄도 안 자르고 logs/server.log 에 보존.
# ============================================================
logging.file.name=logs/server.log
logging.file.max-size=20MB
logging.file.max-history=10
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n
logging.charset.file=UTF-8